name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock

      - name: Install dependencies
        run: |
          cd frontend
          yarn install

      - name: Increment Android Version Code
        run: |
          cd frontend
          node -e "
          const fs = require('fs');
          const app = JSON.parse(fs.readFileSync('app.json'));
          app.expo.android.versionCode = parseInt(process.env.GITHUB_RUN_NUMBER) + 10;
          console.log('Building with versionCode:', app.expo.android.versionCode);
          fs.writeFileSync('app.json', JSON.stringify(app, null, 2));
          "
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}

      - name: Prebuild Android project
        run: |
          cd frontend
          npx expo prebuild --platform android --no-install

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make Gradlew Executable
        run: chmod +x frontend/android/gradlew

      - name: Build Release APK
        run: |
          cd frontend/android
          ./gradlew assembleRelease

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: frontend/android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: InstaVault-Production-APK
          path: ${{ steps.sign_app.outputs.signedReleaseFile }}
