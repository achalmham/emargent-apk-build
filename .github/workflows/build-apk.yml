name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock

      - name: Install dependencies
        run: |
          cd frontend
          yarn install

      - name: Increment Android Version Code
        run: |
          cd frontend
          node -e "
          const fs = require('fs');
          const app = JSON.parse(fs.readFileSync('app.json'));
          app.expo.android.versionCode = parseInt(process.env.GITHUB_RUN_NUMBER) + 10;
          console.log('Building with versionCode:', app.expo.android.versionCode);
          fs.writeFileSync('app.json', JSON.stringify(app, null, 2));
          "
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}

      - name: Prebuild Android project
        run: |
          cd frontend
          npx expo prebuild --platform android --no-install

      - name: Generate JS Bundle and Assets
        run: |
          cd frontend
          mkdir -p android/app/src/main/assets
          npx expo export:embed --platform android --dev false --entry-file node_modules/expo-router/entry.js --bundle-output android/app/src/main/assets/index.android.bundle --assets-dest android/app/src/main/assets

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make Gradlew Executable
        run: chmod +x frontend/android/gradlew

      - name: Build Release APK
        run: |
          cd frontend/android
          ./gradlew assembleRelease

      - name: Sign APK Manually
        run: |
          echo "${{ secrets.SIGNING_KEY }}" | base64 --decode > frontend/android/app/instavault-release-key.jks
          BUILD_TOOLS_DIR=$(ls -d $ANDROID_HOME/build-tools/* | tail -1)
          echo "Using Android Build Tools from: $BUILD_TOOLS_DIR"
          UNSIGNED_APK=$(find frontend/android/app/build/outputs/apk/release/ -name "*.apk" | head -1)
          echo "Signing APK: $UNSIGNED_APK"
          $BUILD_TOOLS_DIR/zipalign -f -v 4 "$UNSIGNED_APK" frontend/android/app/build/outputs/apk/release/app-release-aligned.apk
          $BUILD_TOOLS_DIR/apksigner sign --ks frontend/android/app/instavault-release-key.jks --ks-key-alias "${{ secrets.ALIAS }}" --ks-pass pass:"${{ secrets.KEY_STORE_PASSWORD }}" --key-pass pass:"${{ secrets.KEY_PASSWORD }}" --out frontend/android/app/build/outputs/apk/release/app-release-signed.apk frontend/android/app/build/outputs/apk/release/app-release-aligned.apk
          $BUILD_TOOLS_DIR/apksigner verify frontend/android/app/build/outputs/apk/release/app-release-signed.apk
          rm -f frontend/android/app/instavault-release-key.jks

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: InstaVault-Production-APK
          path: frontend/android/app/build/outputs/apk/release/app-release-signed.apk
